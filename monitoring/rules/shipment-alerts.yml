groups:
  - name: shipment_tracker_alerts
    rules:
      # Alert when more than 3 shipments revert in 10 minutes
      - alert: HighShipmentRevertRate
        expr: increase(shipment_tracker_reverted_shipments_total[10m]) > 3
        for: 0m
        labels:
          severity: critical
          service: vaccine-tracker
        annotations:
          summary: "High shipment revert rate detected"
          description: "More than 3 shipments have been reverted in the last 10 minutes. Current rate: {{ $value }}"
          runbook_url: "https://docs.vaccine-tracker.com/runbooks/high-revert-rate"

      # Alert on temperature breaches
      - alert: TemperatureBreachDetected
        expr: increase(shipment_tracker_temperature_alerts_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
          service: vaccine-tracker
        annotations:
          summary: "Temperature breach detected"
          description: "Temperature alert triggered for shipment. Alert type: {{ $labels.alert_type }}"

      # Alert when no active shipments (might indicate system issues)
      - alert: NoActiveShipments
        expr: shipment_tracker_active_shipments == 0 and shipment_tracker_total_shipments > 0
        for: 5m
        labels:
          severity: warning
          service: vaccine-tracker
        annotations:
          summary: "No active shipments"
          description: "All shipments are inactive, which might indicate a system issue"

      # Alert on high gas prices
      - alert: HighGasPrices
        expr: blockchain_gas_price_gwei > 100
        for: 2m
        labels:
          severity: warning
          service: blockchain
        annotations:
          summary: "High gas prices detected"
          description: "Gas price is {{ $value }} Gwei, which is above the threshold of 100 Gwei"

      # Alert when blockchain is not producing blocks
      - alert: BlockchainStalled
        expr: increase(blockchain_block_height[5m]) == 0
        for: 2m
        labels:
          severity: critical
          service: blockchain
        annotations:
          summary: "Blockchain appears to be stalled"
          description: "No new blocks have been produced in the last 5 minutes"

      # Alert on exporter down
      - alert: BlockchainExporterDown
        expr: up{job="blockchain-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: "Blockchain exporter is down"
          description: "The blockchain metrics exporter has been down for more than 1 minute"